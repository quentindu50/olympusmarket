{% extends "base.html" %}
{% block title %}Nouveau patient - OlympusTransport{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-person-heart"></i> Nouveau patient</h2>
<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nom *</label>
          <input type="text" name="last_name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Prénom *</label>
          <input type="text" name="first_name" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Date de naissance</label>
          <input type="date" name="birth_date" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">N° Sécurité sociale</label>
          <input type="text" name="social_security" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Téléphone</label>
          <input type="tel" name="phone" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Établissement</label>
          <select name="establishment_id" class="form-select">
            <option value="">— Aucun —</option>
            {% for e in establishments %}
            <option value="{{ e.id }}">{{ e.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Adresse</label>
          <input type="text" name="address" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="3"></textarea>
        </div>
        <div class="col-12">
          <a href="{{ url_for('patients.index') }}" class="btn btn-secondary me-2">Annuler</a>
          <button type="submit" class="btn btn-primary">Ajouter le patient</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
