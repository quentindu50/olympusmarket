{% extends 'base.html' %}
{% block title %}- {{ 'Modifier' if transport else 'Nouveau' }} transport{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-ambulance me-2"></i>{{ 'Modifier le transport' if transport else 'Nouveau transport' }}</h4>
  <a href="{{ url_for('transports.list') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Retour</a>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Patient <span class="text-danger">*</span></label>
          <select name="patient_id" class="form-select" required>
            <option value="">— Sélectionner un patient —</option>
            {% for p in patients %}
            <option value="{{ p.id }}" {% if transport and transport.patient_id == p.id %}selected{% endif %}>{{ p.full_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Type de transport <span class="text-danger">*</span></label>
          <select name="transport_type" class="form-select" required>
            <option value="">— Choisir —</option>
            <option value="vsl" {% if transport and transport.transport_type == 'vsl' %}selected{% endif %}>VSL</option>
            <option value="ambulance" {% if transport and transport.transport_type == 'ambulance' %}selected{% endif %}>Ambulance</option>
            <option value="taxi" {% if transport and transport.transport_type == 'taxi' %}selected{% endif %}>Taxi médical</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Chauffeur</label>
          <select name="driver_id" class="form-select">
            <option value="">— Non assigné —</option>
            {% for d in drivers %}
            <option value="{{ d.id }}" {% if transport and transport.driver_id == d.id %}selected{% endif %}>{{ d.full_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Véhicule</label>
          <select name="vehicle_id" class="form-select">
            <option value="">— Non assigné —</option>
            {% for v in vehicles %}
            <option value="{{ v.id }}" {% if transport and transport.vehicle_id == v.id %}selected{% endif %}>{{ v.registration }} — {{ v.vehicle_type | upper }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Adresse de prise en charge <span class="text-danger">*</span></label>
          <input type="text" name="pickup_address" class="form-control" required value="{{ transport.pickup_address if transport else '' }}">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Destination <span class="text-danger">*</span></label>
          <input type="text" name="destination" class="form-control" required value="{{ transport.destination if transport else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Date/heure aller <span class="text-danger">*</span></label>
          <input type="datetime-local" name="scheduled_at" class="form-control" required
            value="{{ transport.scheduled_at.strftime('%Y-%m-%dT%H:%M') if transport and transport.scheduled_at else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Date/heure retour</label>
          <input type="datetime-local" name="return_scheduled_at" class="form-control"
            value="{{ transport.return_scheduled_at.strftime('%Y-%m-%dT%H:%M') if transport and transport.return_scheduled_at else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Motif</label>
          <input type="text" name="reason" class="form-control" value="{{ transport.reason if transport else '' }}" placeholder="Ex: Dialyse, consultation…">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Statut</label>
          <select name="status" class="form-select">
            <option value="pending" {% if not transport or transport.status == 'pending' %}selected{% endif %}>En attente</option>
            <option value="assigned" {% if transport and transport.status == 'assigned' %}selected{% endif %}>Assigné</option>
            <option value="in_progress" {% if transport and transport.status == 'in_progress' %}selected{% endif %}>En cours</option>
            <option value="completed" {% if transport and transport.status == 'completed' %}selected{% endif %}>Terminé</option>
            <option value="cancelled" {% if transport and transport.status == 'cancelled' %}selected{% endif %}>Annulé</option>
          </select>
        </div>
        <div class="col-md-6">
          <div class="form-check mt-4">
            <input class="form-check-input" type="checkbox" name="recurrent" id="recurrent" {% if transport and transport.recurrent %}checked{% endif %}>
            <label class="form-check-label" for="recurrent">Transport récurrent</label>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Récurrence</label>
          <input type="text" name="recurrence_pattern" class="form-control" placeholder="Ex: tous les lundis, 3x/semaine…" value="{{ transport.recurrence_pattern if transport else '' }}">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Notes</label>
          <textarea name="notes" class="form-control" rows="3">{{ transport.notes if transport else '' }}</textarea>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Enregistrer</button>
          <a href="{{ url_for('transports.list') }}" class="btn btn-outline-secondary ms-2">Annuler</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
