{% extends "base.html" %}
{% block title %}Nouveau prescripteur - OlympusTransport{% endblock %}
{% block content %}
<h2 class="mb-4">Nouveau prescripteur</h2>
<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nom *</label>
          <input type="text" name="last_name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Prénom *</label>
          <input type="text" name="first_name" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">N° RPPS</label>
          <input type="text" name="rpps" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Spécialité</label>
          <input type="text" name="specialty" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Établissement</label>
          <select name="establishment_id" class="form-select">
            <option value="">— Aucun —</option>
            {% for e in establishments %}
            <option value="{{ e.id }}">{{ e.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Téléphone</label>
          <input type="tel" name="phone" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control">
        </div>
        <div class="col-12">
          <a href="{{ url_for('admin.index') }}" class="btn btn-secondary me-2">Annuler</a>
          <button type="submit" class="btn btn-primary">Ajouter</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
