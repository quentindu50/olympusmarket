{% extends "base.html" %}
{% block title %}Nouvelle facture - OlympusTransport{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-receipt"></i> Nouvelle facture — Mission #{{ mission.id }}</h2>
<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Montant de base (€) *</label>
          <input type="number" step="0.01" name="amount_base" class="form-control" required min="0">
        </div>
        <div class="col-md-4">
          <label class="form-label">Majorations (€)</label>
          <input type="number" step="0.01" name="amount_surcharges" class="form-control" value="0" min="0">
        </div>
        <div class="col-md-4">
          <label class="form-label">Distance (km)</label>
          <input type="text" class="form-control" value="{{ mission.distance_km or '—' }}" disabled>
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="3"></textarea>
        </div>
        <div class="col-12">
          <a href="{{ url_for('missions.detail', mission_id=mission.id) }}" class="btn btn-secondary me-2">Annuler</a>
          <button type="submit" class="btn btn-primary">Créer la facture</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
