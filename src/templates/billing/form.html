{% extends 'base.html' %}
{% block title %}- {{ 'Modifier' if record else 'Nouvelle' }} facturation{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-receipt me-2"></i>{{ 'Modifier la facturation' if record else 'Nouvelle facturation' }}</h4>
  <a href="{{ url_for('billing.list') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Retour</a>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label fw-semibold">Transport <span class="text-danger">*</span></label>
          <select name="transport_id" class="form-select" required>
            <option value="">— Sélectionner un transport —</option>
            {% for t in transports %}
            <option value="{{ t.id }}" {% if record and record.transport_id == t.id %}selected{% endif %}>
              #{{ t.id }} — {{ t.patient.full_name if t.patient else '?' }} — {{ t.scheduled_at.strftime('%d/%m/%Y') }} — {{ t.destination }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Montant (€)</label>
          <input type="number" step="0.01" name="amount" class="form-control" value="{{ "%.2f"|format(record.amount) if record else '0.00' }}">
        </div>
        <div class="col-md-4">
          <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" name="tiers_payant" id="tiers_payant" {% if record and record.tiers_payant %}checked{% endif %}>
            <label class="form-check-label" for="tiers_payant">Tiers payant</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" name="cpam_transmitted" id="cpam_transmitted" {% if record and record.cpam_transmitted %}checked{% endif %}>
            <label class="form-check-label" for="cpam_transmitted">Transmis CPAM</label>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" name="paid" id="paid" {% if record and record.paid %}checked{% endif %}>
            <label class="form-check-label" for="paid">Payé</label>
          </div>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Date de paiement</label>
          <input type="date" name="payment_date" class="form-control" value="{{ record.payment_date.isoformat() if record and record.payment_date else '' }}">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Notes</label>
          <textarea name="notes" class="form-control" rows="3">{{ record.notes if record else '' }}</textarea>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Enregistrer</button>
          <a href="{{ url_for('billing.list') }}" class="btn btn-outline-secondary ms-2">Annuler</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
