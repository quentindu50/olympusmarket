{% extends "base.html" %}
{% block title %}Nouvelle mission - OlympusTransport{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-map"></i> Nouvelle mission</h2>
<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Patient *</label>
          <select name="patient_id" class="form-select" required>
            <option value="">— Sélectionner —</option>
            {% for p in patients %}
            <option value="{{ p.id }}">{{ p.last_name }} {{ p.first_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Chauffeur</label>
          <select name="driver_id" class="form-select">
            <option value="">— Non assigné —</option>
            {% for d in drivers %}
            <option value="{{ d.id }}">{{ d.last_name }} {{ d.first_name }}{% if not d.is_available %} (indisponible){% endif %}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Véhicule</label>
          <select name="vehicle_id" class="form-select">
            <option value="">— Non assigné —</option>
            {% for v in vehicles %}
            <option value="{{ v.id }}">{{ v.registration }} ({{ v.vehicle_type }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Établissement</label>
          <select name="establishment_id" class="form-select">
            <option value="">— Aucun —</option>
            {% for e in establishments %}
            <option value="{{ e.id }}">{{ e.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Prescripteur</label>
          <select name="prescriber_id" class="form-select">
            <option value="">— Aucun —</option>
            {% for pr in prescribers %}
            <option value="{{ pr.id }}">Dr. {{ pr.last_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Type de mission</label>
          <select name="mission_type" class="form-select">
            <option value="aller">Aller</option>
            <option value="retour">Retour</option>
            <option value="aller-retour">Aller-retour</option>
          </select>
        </div>
        <div class="col-md-12">
          <label class="form-label">Adresse de départ *</label>
          <input type="text" name="pickup_address" class="form-control" required>
        </div>
        <div class="col-md-12">
          <label class="form-label">Adresse d'arrivée *</label>
          <input type="text" name="dropoff_address" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Date/heure planifiée *</label>
          <input type="datetime-local" name="scheduled_at" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Distance (km)</label>
          <input type="number" step="0.1" name="distance_km" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Délai dépôt auto (min)</label>
          <input type="number" name="auto_dropoff_delay" class="form-control" value="30">
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="3"></textarea>
        </div>
        <div class="col-12">
          <a href="{{ url_for('missions.index') }}" class="btn btn-secondary me-2">Annuler</a>
          <button type="submit" class="btn btn-primary">Créer la mission</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
