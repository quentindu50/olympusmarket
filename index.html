<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olympus Marketplace</title>
  <link rel="stylesheet" href="styles/olympus.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1 class="logo">Olympus Marketplace</h1>
    </div>
  </header>

  <main class="marketplace">
    <section class="categories">
      <h2>Categories</h2>
      <ul>
        <li>Technology</li>
        <li>Art & Sculpture</li>
        <li>Jewelry</li>
      </ul>
    </section>

    <section class="products">
      <h2>Featured Products</h2>
      <div class="product-list">
        <article class="product">
          <h3>Golden Laurel Wreath</h3>
          <p>Price: $199</p>
        </article>
        <article class="product">
          <h3>Handcrafted Vase</h3>
          <p>Price: $299</p>
        </article>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Olympus Marketplace. Crafted with history.</p>
  </footer>
</body>
</html>
